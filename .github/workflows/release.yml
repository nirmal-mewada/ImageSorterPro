name: Build Standalone Windows Installer and Release

on:
  push:
    branches: [ "master", "main" ]

permissions:
  contents: write

jobs:
  build_and_release:
    name: Build Windows EXE Installer & Release
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 21 with JavaFX (BellSoft Liberica)
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'liberica'
          java-package: 'jdk+fx'
          cache: 'maven'

      - name: Build JAR with Maven
        run: mvn clean package

      - name: Prepare packaging folder
        run: |
          mkdir target\app
          copy target\ImageSorterPro-1.0-SNAPSHOT.jar target\app\
        shell: cmd

      - name: Build Standalone EXE Installer with jpackage
        run: |
          jpackage --type exe --dest dist --name "ImageSorterPro" --input target/app --main-jar ImageSorterPro-1.0-SNAPSHOT.jar --main-class com.imagesorter.ImageSorterApp --win-shortcut --win-menu --win-dir-chooser --add-modules javafx.controls,javafx.fxml,javafx.swing,javafx.media
        shell: cmd

      - name: Create GitHub Release and Upload Installer
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v1.0.${{ github.run_number }}
          name: Release v1.0.${{ github.run_number }}
          body: |
            Standalone Windows Installer package for ImageSorterPro.
            Build trigger: push to ${{ github.ref_name }} (commit ${{ github.sha }})
          draft: false
          prerelease: false
          files: dist/ImageSorterPro-*.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
