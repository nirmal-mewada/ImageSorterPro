name: Build Standalone Installers and Release

on:
  push:
    branches: [ "master", "main" ]

permissions:
  contents: write
  packages: write

jobs:
  # ─────────────────────────────────────────────────────────────────────────────
  # Windows EXE Installer (jpackage)
  # ─────────────────────────────────────────────────────────────────────────────
  build_windows_exe:
    name: Build Windows EXE Installer
    runs-on: windows-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 21 with JavaFX (BellSoft Liberica)
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'liberica'
          java-package: 'jdk+fx'
          architecture: x64
          cache: 'maven'

      - name: Build JAR with Maven
        run: mvn clean package -DskipTests

      - name: Prepare packaging folder and download FFmpeg
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path target\app
          Copy-Item "target\ImageSorterPro-1.0-SNAPSHOT.jar" "target\app\"
          Copy-Item "scripts\windows\context-menu-install.bat" "target\app\"
          Copy-Item "scripts\windows\context-menu-uninstall.bat" "target\app\"
          
          # Download and extract FFmpeg for Windows
          Write-Host "Downloading FFmpeg for Windows..."
          Invoke-WebRequest -Uri "https://github.com/Tyrrrz/FFmpegBin/releases/download/8.1/ffmpeg-windows-x64.zip" -OutFile "target\ffmpeg.zip"
          Expand-Archive -Path "target\ffmpeg.zip" -DestinationPath "target\ffmpeg-extracted" -Force
          Copy-Item "target\ffmpeg-extracted\ffmpeg.exe" "target\app\"
          Remove-Item "target\ffmpeg.zip"
          Remove-Item -Recurse -Force "target\ffmpeg-extracted"
          Write-Host "FFmpeg successfully bundled!"

      - name: Build EXE Installer with jpackage
        run: |
          jpackage --type exe --dest dist --name "ImageSorterPro" --input target/app --main-jar ImageSorterPro-1.0-SNAPSHOT.jar --main-class com.imagesorter.Main --win-shortcut --win-menu --win-dir-chooser --add-modules javafx.controls,javafx.fxml,javafx.swing,javafx.media --app-version "1.0.${{ github.run_number }}" --win-upgrade-uuid "d3b07384-d113-4ec4-a5e2-fd5a16709292" --icon src/main/resources/com/imagesorter/images/app_icon.ico
        shell: cmd

      - name: Upload EXE artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-exe-installer
          path: dist/ImageSorterPro*.exe

      - name: Upload JAR artifact
        uses: actions/upload-artifact@v4
        with:
          name: cross-platform-jar
          path: target/ImageSorterPro-1.0-SNAPSHOT.jar

      - name: Upload context menu scripts
        uses: actions/upload-artifact@v4
        with:
          name: windows-context-menu-scripts
          path: scripts/windows/context-menu-*.bat

  # ─────────────────────────────────────────────────────────────────────────────
  # Windows Native Image (GraalVM)
  # ─────────────────────────────────────────────────────────────────────────────
  build_windows_native:
    name: Build Windows Native Image
    runs-on: windows-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up GraalVM 21 with JavaFX (Liberica NIK)
        uses: graalvm/setup-graalvm@v1
        with:
          java-version: '21'
          distribution: 'liberica'
          java-package: 'jdk+fx'
          github-token: ${{ secrets.GITHUB_TOKEN }}
          native-image-job-reports: 'true'

      # Cache Maven dependencies (graalvm/setup-graalvm doesn't have built-in Maven cache)
      - name: Cache Maven dependencies
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-native-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-maven-native-
            ${{ runner.os }}-maven-

      - name: Build native image
        shell: cmd
        run: |
          call "C:\Program Files\Microsoft Visual Studio\2022\Enterprise\VC\Auxiliary\Build\vcvars64.bat"
          mvn package -Pnative -DskipTests

      - name: Prepare native binary and download FFmpeg
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist
          Copy-Item "target\ImageSorterPro.exe" "dist\ImageSorterPro-native-windows-x64.exe" -ErrorAction SilentlyContinue
          if (-not (Test-Path "dist\ImageSorterPro-native-windows-x64.exe")) {
            Copy-Item "target\ImageSorterPro" "dist\ImageSorterPro-native-windows-x64.exe" -ErrorAction SilentlyContinue
          }
          
          # Download and extract FFmpeg for Windows
          Write-Host "Downloading FFmpeg for Windows..."
          Invoke-WebRequest -Uri "https://github.com/Tyrrrz/FFmpegBin/releases/download/8.1/ffmpeg-windows-x64.zip" -OutFile "dist\ffmpeg.zip"
          Expand-Archive -Path "dist\ffmpeg.zip" -DestinationPath "dist\ffmpeg-extracted" -Force
          Copy-Item "dist\ffmpeg-extracted\ffmpeg.exe" "dist\ffmpeg.exe"
          Remove-Item "dist\ffmpeg.zip"
          Remove-Item -Recurse -Force "dist\ffmpeg-extracted"
          Write-Host "FFmpeg successfully added to dist folder!"

      - name: Upload native image artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-native-image
          path: |
            dist/ImageSorterPro-native-windows-x64.exe
            dist/ffmpeg.exe
          if-no-files-found: warn

  # ─────────────────────────────────────────────────────────────────────────────
  # macOS App Bundle (jpackage) — Apple Silicon (aarch64)
  # ─────────────────────────────────────────────────────────────────────────────
  build_macos_silicon:
    name: Build macOS App (Apple Silicon)
    runs-on: macos-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 21 with JavaFX (BellSoft Liberica)
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'liberica'
          java-package: 'jdk+fx'
          architecture: aarch64
          cache: 'maven'

      - name: Build JAR with Maven
        run: mvn clean package -DskipTests

      - name: Prepare packaging folder and download FFmpeg
        run: |
          mkdir -p target/app
          cp target/ImageSorterPro-1.0-SNAPSHOT.jar target/app/
          
          # Download and extract FFmpeg for macOS ARM64
          echo "Downloading FFmpeg for macOS (Apple Silicon)..."
          curl -L -o target/ffmpeg.zip https://github.com/Tyrrrz/FFmpegBin/releases/download/8.1/ffmpeg-osx-arm64.zip
          unzip -o target/ffmpeg.zip -d target/ffmpeg-extracted
          cp target/ffmpeg-extracted/ffmpeg target/app/
          chmod +x target/app/ffmpeg
          rm -rf target/ffmpeg.zip target/ffmpeg-extracted
          echo "FFmpeg successfully bundled!"

      - name: Build .app bundle with jpackage
        run: |
          jpackage --type app-image --dest dist \
            --name "ImageSorterPro" \
            --input target/app \
            --main-jar ImageSorterPro-1.0-SNAPSHOT.jar \
            --main-class com.imagesorter.Main \
            --add-modules javafx.controls,javafx.fxml,javafx.swing,javafx.media \
            --app-version "1.0.${{ github.run_number }}" \
            --mac-package-name "ImageSorterPro" \
            --icon src/main/resources/com/imagesorter/images/app_icon.icns

      - name: Ad-hoc sign the .app bundle
        run: |
          codesign --force --deep --sign - dist/ImageSorterPro.app

      - name: Zip .app bundle for distribution (preserving metadata)
        run: |
          cd dist
          ditto -c -k --sequesterRsrc --keepParent "ImageSorterPro.app" "ImageSorterPro-macOS-aarch64.zip"

      - name: Upload macOS Silicon artifact
        uses: actions/upload-artifact@v4
        with:
          name: macos-silicon-app
          path: dist/ImageSorterPro-macOS-aarch64.zip

  # ─────────────────────────────────────────────────────────────────────────────
  # Create GitHub Release with all artifacts
  # ─────────────────────────────────────────────────────────────────────────────
  release:
    name: Create Release
    needs: [build_windows_exe, build_windows_native, build_macos_silicon]
    if: always() && needs.build_windows_exe.result == 'success'
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts

      - name: List release artifacts
        run: find release-artifacts -type f | head -20

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v1.0.${{ github.run_number }}
          name: Release v1.0.${{ github.run_number }}
          body: |
            ## ImageSorterPro v1.0.${{ github.run_number }}

            Standalone packages for ImageSorterPro — quick-sort and organize images/videos using hotkeys.

            ### 📦 Downloads

            | Platform | Package | Description |
            |----------|---------|-------------|
            | 🪟 Windows | `ImageSorterPro-1.0.*.exe` | Installer with embedded JVM (recommended) |
            | 🪟 Windows | `ImageSorterPro-native-windows-x64.exe` | GraalVM native binary (no JVM needed, fastest startup) |
            | 🍎 macOS (Apple Silicon) | `ImageSorterPro-macOS-aarch64.zip` | .app bundle for M1/M2/M3/M4 Macs |
            | 🌐 Cross-platform | `ImageSorterPro-1.0-SNAPSHOT.jar` | Portable fat JAR (requires Java 14+ with JavaFX) |
            | 🪟 Windows (Optional) | `context-menu-install.bat` | Adds "Open with ImageSorterPro" to folder right-click menu |

            ### 🪟 Windows: Right-Click Context Menu
            After installing, run `context-menu-install.bat` (bundled in the installer or download separately) to add **"Open with ImageSorterPro"** to the right-click menu for any folder in Windows Explorer. No admin rights required. Run `context-menu-uninstall.bat` to remove it.

            ### 🍎 macOS Note
            After downloading and unzipping, you may need to right-click → Open to bypass Gatekeeper on first launch.

            ---
            Build trigger: push to `${{ github.ref_name }}` (commit `${{ github.sha }}`)
          draft: false
          prerelease: false
          files: |
            release-artifacts/windows-exe-installer/*
            release-artifacts/windows-native-image/*
            release-artifacts/macos-silicon-app/*
            release-artifacts/cross-platform-jar/*
            release-artifacts/windows-context-menu-scripts/*
          fail_on_unmatched_files: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
