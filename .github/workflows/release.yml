name: Build Standalone Windows Installer

on:
  push:
    branches: [ "master", "main" ]

jobs:
  build_windows:
    name: Build Windows EXE Installer
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 21 with JavaFX (BellSoft Liberica)
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'liberica'
          java-package: 'jdk+fx'
          cache: 'maven'

      - name: Build JAR with Maven
        run: mvn clean package

      - name: Prepare packaging folder
        run: |
          mkdir target\app
          copy target\ImageSorterPro-1.0-SNAPSHOT.jar target\app\
        shell: cmd

      - name: Build Standalone EXE Installer with jpackage
        run: |
          jpackage --type exe --dest dist --name "ImageSorterPro" --input target/app --main-jar ImageSorterPro-1.0-SNAPSHOT.jar --main-class com.imagesorter.ImageSorterApp --win-shortcut --win-menu --win-dir-chooser --add-modules javafx.controls,javafx.fxml,javafx.swing,javafx.media
        shell: cmd

      - name: Upload Installer Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ImageSorterPro-Windows-Installer
          path: dist/ImageSorterPro-*.exe
